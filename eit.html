<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eid Al Adha</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            background: #f8f5f0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: linear-gradient(to bottom, #faf7f2, #f5efe5);
            position: relative;
            overflow: hidden;
        }

        /* Background blur circles */

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.5;
        }

        .c1 {
            width: 220px;
            height: 220px;
            background: #f1d9a8;
            top: -50px;
            left: -70px;
        }

        .c2 {
            width: 180px;
            height: 180px;
            background: #ffffff;
            bottom: 120px;
            right: -40px;
        }

        .top-design {
            width: 70px;
            height: 220px;
            background: #d8cec0;
            opacity: 0.4;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 50px 50px;
        }

        /* TEXTS */

        .arabic {
            position: relative;
            text-align: center;
            margin-top: 0;
            font-size: clamp(30px, 8vw, 52px);
            color: #4b3127;
            font-weight: 700;
            z-index: 2;
            padding: 0 15px;

            transform: translateY(100px);
        }


        /* .arabic {
            text-align: center;
            margin-top: -50px;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(32px, 9vw, 55px);
            color: black;
            padding: 0 10px;
        } */

        /* .happy {
            text-align: center;
            margin-top: -20px;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(32px, 9vw, 55px);
            color: #b28b2f;
            padding: 0 10px;
        } */

        .eid {
            text-align: center;
            font-size: clamp(42px, 12vw, 68px);
            font-weight: 700;
            letter-spacing: 4px;
            color: #3f2c25;
            line-height: 1;
            margin-top: 5px;
            padding: 0 10px;
        }

        .date {
            text-align: center;
            margin-top: 15px;
            color: #a88a3c;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 600;
        }

        /* GOAT SECTION */

        .goat-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        .smoke {
            position: absolute;
            width: 90%;
            height: 180px;
            background: rgba(255, 255, 255, 0.7);
            filter: blur(45px);
            bottom: 20px;
            border-radius: 50%;
        }

        .goat {
            width: 75%;
            max-width: 300px;
            object-fit: contain;
            z-index: 2;
            margin-right: 120px;
            margin-bottom: -50px;
        }

        /* FLOAT ANIMATION */

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* STARS */

        .stars span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d8b96b;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        /* TABLET */

        @media (min-width: 768px) {
            .container {
                max-width: 500px;
                border-radius: 20px;
            }

            .goat {
                width: 65%;
            }
        }

        /* SMALL MOBILE */

        @media (max-width: 480px) {
            .top-design {
                width: 55px;
                height: 170px;
            }

            .smoke {
                height: 140px;
            }

            .goat {
                width: 85%;
            }

            .arabic {
                margin-top: 25px;
            }
        }

        @media screen and (width: 375px) and (height: 667px) {

            body {
                overflow: hidden;
            }

            .container {
                width: 375px;
                height: 667px;
            }

            .top-design {
                width: 50px;
                height: 150px;
            }

            .arabic {
                font-size: 34px;
                margin-top: 30px;
            }

            .happy {
                font-size: 36px;
                margin-top: 20px;
            }

            .eid {
                font-size: 52px;
                letter-spacing: 3px;
                margin-top: 5px;
            }

            .date {
                font-size: 17px;
                margin-top: 12px;
            }

            .circle.c1 {
                width: 170px;
                height: 170px;
                top: -40px;
                left: -50px;
            }

            .circle.c2 {
                width: 130px;
                height: 130px;
                bottom: 100px;
                right: -35px;
            }

            .smoke {
                width: 90%;
                height: 130px;
                bottom: 10px;
            }

            .goat {
                width: 82%;
                max-width: 240px;
                margin-right: 0;
                margin-bottom: -100px;
            }
        }

        /* iPad Mini - 768 × 1024 */

        @media screen and (width: 768px) and (height: 1024px) {

            body {
                overflow: hidden;
                padding: 0;
            }

            .container {
                width: 768px;
                height: 1024px;
                max-width: 100%;
            }

            .top-design {
                width: 90px;
                height: 260px;
            }

            .arabic {
                font-size: 70px;
                margin-top: 60px;
            }

            .happy {
                font-size: 72px;
                margin-top: 40px;
            }

            .eid {
                font-size: 110px;
                letter-spacing: 6px;
                margin-top: 10px;
            }

            .date {
                font-size: 32px;
                margin-top: 20px;
            }

            .circle.c1 {
                width: 320px;
                height: 320px;
                top: -80px;
                left: -100px;
            }

            .circle.c2 {
                width: 260px;
                height: 260px;
                bottom: 180px;
                right: -70px;
            }

            .smoke {
                width: 85%;
                height: 220px;
                bottom: 20px;
            }

            .goat {
                width: 65%;
                max-width: 420px;
                margin-right: 350px;
            }
        }

        /* iPad Air - 820 × 1180 */

        @media screen and (width: 820px) and (height: 1180px) {

            body {
                overflow: hidden;
                padding: 0;
            }

            .container {
                width: 820px;
                height: 1180px;
                max-width: 100%;
            }

            .top-design {
                width: 100px;
                height: 300px;
            }

            .arabic {
                font-size: 76px;
                margin-top: 70px;
            }

            .happy {
                font-size: 80px;
                margin-top: 45px;
            }

            .eid {
                font-size: 120px;
                letter-spacing: 7px;
                margin-top: 10px;
            }

            .date {
                font-size: 36px;
                margin-top: 20px;
            }

            .circle.c1 {
                width: 360px;
                height: 360px;
                top: -90px;
                left: -110px;
            }

            .circle.c2 {
                width: 280px;
                height: 280px;
                bottom: 220px;
                right: -80px;
            }

            .smoke {
                width: 85%;
                height: 260px;
                bottom: 20px;
            }

            .goat {
                width: 65%;
                max-width: 480px;
                margin-right: 350px;
            }
        }

        /* Only iPad Pro */

        @media only screen and (min-width: 834px) and (max-width: 1024px) and (min-height: 1194px) and (max-height: 1366px) {

            body {
                overflow: hidden;
                padding: 0;
            }

            .container {
                width: 100%;
                height: 100vh;
                max-width: 100%;
            }

            .top-design {
                width: 105px;
                height: 320px;
            }

            .arabic {
                font-size: 80px;
                margin-top: 75px;
            }

            .happy {
                font-size: 84px;
                margin-top: 45px;
            }

            .eid {
                font-size: 126px;
                letter-spacing: 8px;
            }

            .date {
                font-size: 38px;
                margin-top: 20px;
            }

            .circle.c1 {
                width: 380px;
                height: 380px;
                top: -100px;
                left: -120px;
            }

            .circle.c2 {
                width: 300px;
                height: 300px;
                bottom: 220px;
                right: -90px;
            }

            .smoke {
                width: 86%;
                height: 280px;
                bottom: 20px;
            }

            .goat {
                width: 64%;
                max-width: 500px;
                margin-right: 1000px;
            }
        }

        /* Nest Hub - 1024 × 600 */

        @media screen and (width: 1024px) and (height: 600px) {

            .container {
                width: 1024px;
                height: 600px;
                max-width: 100%;
            }

            .top-design {
                width: 80px;
                height: 180px;
            }

            .arabic {
                font-size: 48px;
                margin-top: 25px;
            }

            .happy {
                font-size: 50px;
                margin-top: 15px;
            }

            .eid {
                font-size: 82px;
                letter-spacing: 5px;
            }

            .date {
                font-size: 24px;
                margin-top: 10px;
            }

            .circle.c1 {
                width: 240px;
                height: 240px;
            }

            .circle.c2 {
                width: 180px;
                height: 180px;
                bottom: 120px;
            }

            .smoke {
                height: 140px;
                bottom: 0;
            }

            .goat {
                width: 38%;
                max-width: 280px;
                margin-right: 0;
            }
        }


        /* Nest Hub Max - 1280 × 800 */

        @media screen and (width: 1024px) and (height: 600px) {

            .container {
                width: 1280px;
                height: 800px;
                max-width: 100%;
            }

            .top-design {
                width: 100px;
                height: 240px;
            }

            .arabic {
                font-size: 62px;
                margin-top: 35px;
            }

            .happy {
                font-size: 64px;
                margin-top: 20px;
            }

            .eid {
                font-size: 100px;
                letter-spacing: 6px;
            }

            .date {
                font-size: 30px;
                margin-top: 14px;
            }

            .circle.c1 {
                width: 300px;
                height: 300px;
            }

            .circle.c2 {
                width: 220px;
                height: 220px;
                bottom: 150px;
            }

            .smoke {
                height: 180px;
                bottom: 10px;
            }

            .goat {
                width: 40%;
                max-width: 340px;
                margin-right: 700px;
            }
        }

        @media screen and (width: 1080px) and (height: 800px) {

            .container {
                width: 1280px;
                height: 800px;
                max-width: 100%;
            }

            .top-design {
                width: 100px;
                height: 240px;
            }

            .arabic {
                font-size: 62px;
                margin-top: 35px;
            }

            .happy {
                font-size: 64px;
                margin-top: 20px;
            }

            .eid {
                font-size: 100px;
                letter-spacing: 6px;
            }

            .date {
                font-size: 30px;
                margin-top: 14px;
            }

            .circle.c1 {
                width: 300px;
                height: 300px;
            }

            .circle.c2 {
                width: 220px;
                height: 220px;
                bottom: 150px;
            }

            .smoke {
                height: 180px;
                bottom: 10px;
            }

            .goat {
                width: 40%;
                max-width: 340px;
                margin-right: 1000px;
            }
        }
    </style>
</head>

<body>

    <!-- <div class="container"> -->

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="top-design"></div>


    <div class="arabic"> عيد الأضحى مبارك </div>
    <div class="happy"></div>



    <div class="eid">

    </div>

    <!-- <div class="date">
            10 Zulhijjah 1446 H
        </div> -->

    <div class="goat-section">

        <div class="smoke"></div>

        <!-- <img class="goat"
                src="https://images.unsplash.com/photo-1516467508483-a7212febe31a?q=80&w=1200&auto=format&fit=crop"
                alt="Goat"> -->
        <img class="goat" src="assets/goat.png">

    </div>

    </div>

    <script>

        const container = document.querySelector('.container');

        for (let i = 0; i < 25; i++) {

            const star = document.createElement('span');

            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';

            star.style.animationDuration =
                (Math.random() * 3 + 1) + 's';

            document.querySelector('.stars')?.appendChild(star);

        }

    </script>

</body>

</html>
